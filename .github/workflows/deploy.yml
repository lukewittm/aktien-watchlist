name: Deploy

on:
  push:
    branches: [main]
  schedule:
    # 05:00 UTC, Mo–Fr = 06:00/07:00 MEZ/MESZ, nach US-Schluss / vor EU-Handelsstart
    - cron: '0 5 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Holt frische Kurse für den Build. Läuft nur in diesem Job – wird NIE committet,
      # dadurch wächst das Repo nicht (kein Daten-Branch, keine täglichen Commits nötig).
      - run: npm run fetch
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
